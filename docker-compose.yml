services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infera_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
      - sqlite_data:/app/chat_memory.db
    restart: unless-stopped

volumes:
  chroma_data:
  sqlite_data:
